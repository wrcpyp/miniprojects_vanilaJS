<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency-Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <h1 class="tital">Currency converter</h1>

        <div class="content-wrapper">
            <div class="irr">
                <label for="">IRR</label>
                <input type="number" id="irr" name="irr">
            </div>
            <button class="btn-con" type="submit" onclick="convert()">Convert</button>
            <div class="usd">
                <input type="number" id="usd" name="usd">
                <label for="">USD</label>
            </div>
        </div>
    </div>




    <script src="script.js"></script>
</body>

</html>
