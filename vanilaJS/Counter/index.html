<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="number" id="number">0</h1>
        <div class="btn">
            <button class="plus" onclick="increase()">+</button>
            <button class="minus" onclick="decrease()">-</button>
        </div>
        <h3>Clicks on Plus : <span id="countPlus">0</span></h3>
        <h3>Clicks on Minus : <span id="countMinus">0</span></h3>
    </div>


    <script src="app.js"></script>
</body>

</html>
