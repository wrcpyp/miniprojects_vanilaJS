<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color-Flipper</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <h1 class="title">Color Flipper</h1>
        <div class="btn-wrapper">
            <button id="green" class="green" onclick="bgGreen()">Green</button>
            <button id="red" class="red" onclick="bgRed()">Red</button>
            <button id="blue" class="blue" onclick="bgBlue()">Blue</button>
            <button id="random" class="random" onclick="bgRandom()">Random</button>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
