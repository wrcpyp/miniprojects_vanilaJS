<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>TodoList</h1>
        <input type="text" id="addTask">
        <button class="addTaskBtn">Add</button>

        <br>

        <input type="checkbox" id="activeTasks">Active
        <input type="checkbox" id="completedTasks">Completed


        <h4 class="showTasksTitle">Active</h4>
        <div class="showTasks"></div>

        <h4 class="completedTasksTitle">Completed</h4>
        <div class="showCompletedTasks"></div>

        <div class="showTaskAmount">All Tasks : <span class="amount">0</span></div>

        <button class="clearBtn">ClearAll</button>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
